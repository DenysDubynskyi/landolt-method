<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Методика DD — Интерактивный Урок</title>
    <style>
        /* ЦВЕТОВЫЕ ТЕМЫ */
        :root {
            --primary-color: #007bff; 
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
            --card-bg: #ffffff;
            --sub-bg: #2f3640;
            --sub-text: #ffffff;
            --btn-theme-bg: #28a745; 
        }

        body.green-theme {
            --primary-color: #28a745; 
            --bg-color: #f0f7f4;
            --text-color: #1e3020;
            --border-color: #cfe2ce;
            --card-bg: #ffffff;
            --sub-bg: #1e3020;
            --sub-text: #ffffff;
            --btn-theme-bg: #007bff; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .header-wrapper {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            width: 100%;
        }

        header {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo { font-weight: bold; font-size: 20px; color: var(--primary-color); }
        .controls-panel { display: flex; align-items: center; gap: 15px; }

        .theme-toggle-btn {
            background-color: var(--btn-theme-bg);
            color: white; border: none; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px;
        }

        .lang-selector { display: flex; gap: 5px; }
        .lang-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-color);
            padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .lang-btn.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        .steps-nav {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px;
            margin-bottom: 25px; border-bottom: 1px solid var(--border-color);
        }

        .step-tab {
            padding: 10px 18px; background-color: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--text-color); border-radius: 20px; cursor: pointer; white-space: nowrap;
            font-weight: 500; font-size: 13px;
        }
        .step-tab.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        .main-layout { display: flex; flex-direction: column; gap: 20px; }

        .iframe-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0;
            border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #000;
        }
        .iframe-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .subtitles-box {
            background-color: var(--sub-bg); color: var(--sub-text);
            padding: 12px 15px; border-radius: 8px; font-size: 14px; text-align: center;
            border-left: 5px solid var(--primary-color); margin-top: 5px;
        }

        .content-card {
            background-color: var(--card-bg); padding: 25px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color);
        }
        .content-card h2 { margin-top: 0; font-size: 20px; color: var(--text-color); margin-bottom: 15px; }

        .summary-box {
            background-color: rgba(0, 123, 255, 0.03);
            border-left: 4px solid var(--primary-color);
            padding: 15px; margin-bottom: 20px; border-radius: 4px;
        }
        .summary-box h3 { margin: 0 0 8px 0; font-size: 15px; color: var(--primary-color); }
        .summary-box p { margin: 0; font-size: 14px; color: var(--text-color); }

        .exercises-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        
        /* КАРТОЧКА УПРАЖНЕНИЯ С КАРТИНКОЙ */
        .exercise-item {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 12px 15px; cursor: pointer; transition: all 0.2s;
            display: flex; gap: 15px; align-items: center;
        }
        .exercise-item:hover { border-color: var(--primary-color); background-color: rgba(0, 123, 255, 0.01); }
        .exercise-item.active { border-color: var(--primary-color); background-color: rgba(0, 123, 255, 0.04); }
        
        /* Блок для визуала */
        .exercise-image-box {
            width: 55px; height: 55px; min-width: 55px;
            background-color: #f8f9fa; border: 1px dashed #b2bec3;
            border-radius: 6px; display: flex; justify-content: center;
            align-items: center; font-size: 24px; box-sizing: border-box;
        }
        .exercise-info { flex-grow: 1; }

        .exercise-item h4 { margin: 0 0 6px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .time-tag { font-size: 11px; color: white; background-color: var(--primary-color); padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .exercise-item p { margin: 0; font-size: 13px; color: #7f8c8d; line-height: 1.4; }

        .full-text-accordion { border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; margin-top: 15px; }
        .accordion-trigger {
            width: 100%; background-color: #f8f9fa; border: none; padding: 12px 15px;
            text-align: left; font-weight: bold; font-size: 13.5px; color: var(--text-color);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .accordion-trigger:hover { background-color: #e9ecef; }
        .accordion-content { display: none; padding: 15px; background-color: #ffffff; border-top: 1px solid var(--border-color); font-size: 14px; color: #34495e; max-height: 400px; overflow-y: auto; }

        .download-box { display: flex; gap: 15px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 12px; text-align: center; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 13px; display: inline-block; border: none; cursor: pointer; }
        .btn-blue { background-color: #007bff; }
        .btn-green { background-color: #28a745; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background-color: white; border-radius: 12px; max-width: 1000px; width: 100%; height: 90vh; display: flex; flex-direction: column; padding: 20px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 32px; font-weight: bold; color: #7f8c8d; cursor: pointer; }
        .close-modal:hover { color: #000; }
        .pdf-viewer-container { flex-grow: 1; width: 100%; height: 100%; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; background-color: #f1f2f6; margin-top: 15px; }
        .pdf-frame { width: 100%; height: 100%; border: none; }
        .modal-header-area { text-align: left; padding-right: 40px; }
        .modal-btn-print { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; align-self: flex-start; margin-top: 15px; }

        @media (max-width: 600px) {
            .download-box { flex-direction: column; gap: 10px; }
            .content-card { padding: 15px; }
            header { justify-content: center; text-align: center; }
            .exercise-item { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="header-wrapper">
    <header>
        <div class="logo">Методика DD</div>
        <div class="controls-panel">
            <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()">Переключить на Зелёную тему</button>
            <div class="lang-selector">
                <button class="lang-btn active">RU</button>
                <button class="lang-btn">UA</button>
                <button class="lang-btn">EN</button>
            </div>
        </div>
    </header>
</div>

<div class="container">
    <div class="steps-nav">
        <button class="step-tab" onclick="switchStep(1, this)">Шаг 1</button>
        <button class="step-tab" onclick="switchStep(2, this)">Шаг 2</button>
        <button class="step-tab" onclick="switchStep(3, this)">Шаг 3</button>
        <button class="step-tab" onclick="switchStep(4, this)">Шаг 4</button>
        <button class="step-tab" onclick="switchStep(5, this)">Шаг 5</button>
        <button class="step-tab" onclick="switchStep(6, this)">Шаг 6</button>
        <button class="step-tab" onclick="switchStep(7, this)">Шаг 7</button>
        <button class="step-tab" onclick="switchStep(8, this)">Шаг 8</button>
    </div>

    <div class="main-layout">
        <div class="video-section">
            <div class="iframe-wrapper">
                <iframe id="video-player" src="" allowfullscreen></iframe>
            </div>
            <div class="subtitles-box" id="subtitles">
                📋 Текстовое описание и важные нюансы текущего шага находятся чуть ниже.
            </div>
        </div>

        <div class="content-card" id="dynamic-content"></div>

        <div class="download-box">
            <button onclick="openLandoltModal()" class="btn-action btn-blue">👁️ Открыть Таблицу Ландольта</button>
            <a href="vision_diary.xlsx" download class="btn-action btn-green">📥 Скачать Дневник (Excel)</a>
        </div>
    </div>
</div>

<div id="landolt-modal" class="modal-overlay" onclick="closeLandoltModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeLandoltModal(event)">&times;</span>
        <div class="modal-header-area">
            <h2 style="margin: 0; color:#007bff; font-size: 22px;">Оригинальная таблица Головина-Ландольта (ГОСТ)</h2>
            <p style="color:#7f8c8d; font-size:13px; margin: 5px 0 0 0;">
                Медицинский калибровочный документ. Используйте встроенные инструменты для масштабирования и точной печати на А4.
            </p>
        </div>
        <div class="pdf-viewer-container">
            <iframe id="pdf-frame" class="pdf-frame" src="landolt_table.pdf"></iframe>
        </div>
        <button class="modal-btn-print" onclick="printPDF()">Распечатать таблицу</button>
    </div>
</div>

<script>
    const videoIDs = {
        1: "MH96n6Qfn7w", 2: "I1xsAlrI7uo", 3: "FOuHh-QUEbk", 4: "2LKvutESB-I",
        5: "f2ZAKk_u4CU", 6: "u4YLm5xKJL0", 7: "aOjabwu5GzU", 8: "NnhBp5lhLZg"
    };

    const stepContents = {
        1: {
            title: "Шаг 1: Правила старта",
            summary: "В этом видео объясняется философия методики. Автор рассказывает, почему важно строго придерживаться оригинального алгоритма без изменений, чтобы получить запланированный результат.",
            hasExercises: false,
            fullText: "Я считаю, что каждому человеку лучше создать собственную систему, чем всю жизнь пользоваться чужой..."
        },
        2: {
            title: "Шаг 2: История создания методики",
            summary: "Личный опыт Дениса Дубинского...",
            hasExercises: false,
            fullText: "Около десяти лет назад моё зрение заметно ухудшилось..."
        },
        3: {
            title: "Шаг 3: Как контролировать прогресс",
            summary: "В видео показан точный метод замера результатов...",
            hasExercises: false,
            fullText: "Для проверки зрения я использовал таблицу Ландольта..."
        },
        4: {
            title: "Шаг 4: 5 Основных принципов",
            summary: "Главный теоретический блок...",
            hasExercises: false,
            fullText: "4.1. Фиксация на одной точке..."
        },
        5: {
            title: "Шаг 5: Подготовка рабочего места",
            summary: "Как правильно обустроить зону тренировок дома...",
            hasExercises: false,
            fullText: "5.1. Выбор места..."
        },
        6: {
            title: "Шаг 6: Интерактивный статический комплекс",
            summary: "Ниже представлены таймкоды для 11 упражнений статики. Кликните по любому пункту, чтобы запустить демонстрацию нужного движения на видеоплеере.",
            hasExercises: true,
            fullText: "Все упражнения этого комплекса выполняются по 10 повторений...",
            items: [
                { id: 1, time: "0:10", visual: "↕️", name: "Упражнение №1", desc: "Зафиксируйте взгляд. Максимально голову назад (вдох + ФТ), максимально вниз до груди (выдох + ФТ)." },
                { id: 2, time: "0:45", visual: "➡️↕️", name: "Упражнение №2", desc: "Выполнение упражнения №1 (вверх-вниз), но с максимально повернутой головой вправо." },
                { id: 3, time: "1:20", visual: "⬅️↕️", name: "Упражнение №3", desc: "Выполнение упражнения №1 (вверх-вниз), но с максимально повернутой головой влево." },
                { id: 4, time: "1:55", visual: "↔️", name: "Упражнение №4", desc: "Поворот головы вправо (вдох + ФТ), затем плавно поворот влево (выдох + ФТ)." },
                { id: 5, time: "2:30", visual: "↗️↔️", name: "Упражнение №5", desc: "Выполнение упражнения №4 (влево-вправо), но с максимально запрокинутой назад головой." },
                { id: 6, time: "3:05", visual: "↘️↔️", name: "Упражнение №6", desc: "Выполнение упражнения №4 (влево-вправо), но с подбородком, прижатым к грудной клетке." },
                { id: 7, time: "3:40", visual: "↗️", name: "Упражнение №7", desc: "Движение головы по диагонали из нижнего левого положения в верхнее правое. ФТ." },
                { id: 8, time: "4:15", visual: "↖️", name: "Упражнение №8", desc: "Движение по второй диагонали: из нижнего правого в верхнее левое. ФТ." },
                { id: 9, time: "4:50", visual: "🔄", name: "Упражнение №9", desc: "Круговые вращения головой по часовой стрелке. В нижней точке — ФТ." },
                { id: 10, time: "5:30", visual: "↩️", name: "Упражнение №10", desc: "Круговые вращения головой против часовой стрелки. В нижней точке — ФТ." },
                { id: 11, time: "6:10", visual: "💆‍♂️", name: "Упражнение №11. Массаж", desc: "Закрыть глаза, прижать ладонями со стороны мизинцев. По 10 кругов в каждую сторону." }
            ]
        },
        7: {
            title: "Шаг 7: Динамический комплекс в движении",
            summary: "Интерактивный список упражнений в движении. Нажмите на пункт ниже для быстрой перемотки видео к технике выполнения конкретного упражнения.",
            hasExercises: true,
            fullText: "Все упражнения выполняются по 10 повторений плавными непрерывными шагами...",
            items: [
                { id: 1, time: "0:15", visual: "🚶‍♂️", name: "Упражнение №1", desc: "Шаг вперёд (вдох + ФТ на точке), движение назад (выдох + ФТ)." },
                { id: 2, time: "1:00", visual: "↪️👀", name: "Упражнение №2", desc: "Голова повернута вправо на 90°. Движение вперёд — взгляд на точке. Движение назад — взгляд переводится на стену сзади." },
                { id: 3, time: "1:45", visual: "↩️👀", name: "Упражнение №3", desc: "Зеркальное отображение упражнения №2 (Голова влево, шаг левой ногой)." },
                { id: 4, time: "2:30", visual: "🔼👀", name: "Упражнение №4", desc: "Голова запрокинута назад. Вперёд — взгляд на точку. Назад — взгляд переводится максимально вверх." },
                { id: 5, time: "3:15", visual: "🔽👀", name: "Упражнение №5", desc: "Подбородок прижат к груди. Вперёд — фиксация на точке. Назад — перевод взгляда максимально вниз." }
            ]
        },
        8: {
            title: "Шаг 8: Результаты и мотивация",
            summary: "Финальное видео: ежедневная практика по 10 минут даёт плоды...",
            hasExercises: false,
            fullText: "После того как система была полностью сформирована..."
        }
    };

    let currentStep = 1;
    const exerciseTimestamps = {
        6: { 1: 10, 2: 45, 3: 80, 4: 115, 5: 150, 6: 185, 7: 220, 8: 255, 9: 290, 10: 330, 11: 370 },
        7: { 1: 15, 2: 60, 3: 105, 4: 150, 5: 195 }
    };

    function initPlayer() {
        const initialTab = document.querySelector('.steps-nav .step-tab:first-child');
        if (initialTab) initialTab.classList.add('active');
        document.getElementById('video-player').src = "https://www.youtube.com/embed/" + videoIDs[1] + "?enablejsapi=1";
        updateContentCard(1);
    }

    window.onload = initPlayer;

    function switchStep(stepNum, element) {
        currentStep = stepNum;
        const tabs = document.querySelectorAll('.step-tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');

        document.getElementById('video-player').src = "https://www.youtube.com/embed/" + videoIDs[stepNum] + "?enablejsapi=1&autoplay=1";
        updateContentCard(stepNum);
        
        const sub = document.getElementById('subtitles');
        if(stepContents[stepNum].hasExercises) {
            sub.innerHTML = "🎯 Нажмите на интерактивные карточки упражнений ниже, чтобы сразу перемотать видео к нужному элементу.";
        } else {
            sub.innerHTML = "📋 Текстовое описание и важные нюансы текущего шага находятся чуть ниже.";
        }
    }

    function updateContentCard(stepNum) {
        const data = stepContents[stepNum];
        const container = document.getElementById('dynamic-content');
        if (!data || !container) return;

        let exercisesHTML = '';
        if (data.hasExercises) {
            exercisesHTML += `<div class="exercises-list">`;
            data.items.forEach(item => {
                exercisesHTML += `
                    <div class="exercise-item" onclick="seekToExercise(${item.id}, event)">
                        <div class="exercise-image-box">${item.visual}</div>
                        <div class="exercise-info">
                            <h4><span>${item.name}</span> <span class="time-tag">${item.time}</span></h4>
                            <p>${item.desc}</p>
                        </div>
                    </div>
                `;
            });
            exercisesHTML += `</div>`;
        }

        container.innerHTML = `
            <h2>${data.title}</h2>
            
            <div class="summary-box">
                <h3>💡 О чём это видео:</h3>
                <p>${data.summary}</p>
            </div>

            ${exercisesHTML}

            <div class="full-text-accordion">
                <button class="accordion-trigger" onclick="toggleAccordion()">
                    📖 Показать полное текстовое руководство к шагу <span id="arrow-icon">▼</span>
                </button>
                <div class="accordion-content" id="accordion-text">
                    ${data.fullText}
                </div>
            </div>
        `;
    }

    function toggleAccordion() {
        const content = document.getElementById('accordion-text');
        const arrow = document.getElementById('arrow-icon');
        if (content.style.display === 'block') {
            content.style.display = 'none';
            arrow.innerText = '▼';
        } else {
            content.style.display = 'block';
            arrow.innerText = '▲';
        }
    }

    function seekToExercise(itemId, event) {
        const stepTimeMap = exerciseTimestamps[currentStep];
        if (stepTimeMap && stepTimeMap[itemId]) {
            const seconds = stepTimeMap[itemId];
            document.getElementById('video-player').src = "https://www.youtube.com/embed/" + videoIDs[currentStep] + "?enablejsapi=1&autoplay=1&start=" + seconds;
            
            const items = document.querySelectorAll('.exercise-item');
            items.forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.querySelector('.video-section').scrollIntoView({ behavior: 'smooth' });
        }
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        body.classList.toggle('green-theme');
        btn.innerText = body.classList.contains('green-theme') ? "Переключить на Синюю тему" : "Переключить на Зелёную тему";
    }

    function openLandoltModal() { document.getElementById('landolt-modal').style.display = 'flex'; }
    function closeLandoltModal(event) { document.getElementById('landolt-modal').style.display = 'none'; }
    function printPDF() {
        const iframe = document.getElementById('pdf-frame');
        try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch (e) { window.open(iframe.src, '_blank'); }
    }
</script>

</body>
</html>
