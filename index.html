<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Методика DD — Шаг 6</title>
    <style>
        :root {
            --primary-color: #007bff; 
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* Вкладки шагов */
        .steps-nav { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .step-tab { padding: 10px 18px; background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 20px; cursor: pointer; font-weight: 500; font-size: 13px; }
        .step-tab.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* Видеозона */
        .visual-display-zone { width: 100%; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #000; margin-bottom: 25px; }
        .video-wrapper { padding-bottom: 56.25%; height: 0; position: relative; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Карточка с контентом */
        .content-card { background-color: var(--card-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
        .exercise-selector-wrapper { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .exercise-select-dropdown { width: 100%; padding: 12px 15px; font-size: 15px; font-weight: bold; color: var(--text-color); border: 2px solid var(--primary-color); border-radius: 8px; cursor: pointer; outline: none; }
        
        .focused-exercise-card { background-color: var(--card-bg); border-radius: 6px; padding: 20px; box-shadow: inset 5px 0 0 var(--primary-color); background: #f8fafc; }
        .ex-short-brief { font-size: 14px; font-weight: 600; color: var(--primary-color); margin-bottom: 12px; background: rgba(0,123,255,0.06); padding: 8px 12px; border-radius: 4px; }
        .ex-full-details { font-size: 14px; color: #34495e; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <!-- Шапка навигации -->
    <div class="steps-nav">
        <button class="step-tab">Шаг 5</button>
        <button class="step-tab active">Шаг 6 (Тренажер)</button>
        <button class="step-tab">Шаг 7</button>
    </div>

    <!-- Видео-урок (Полноэкранный плеер) -->
    <div class="visual-display-zone">
        <div class="video-wrapper">
            <!-- Здесь ваша ссылка на видео -->
            <iframe src="https://www.youtube.com/embed/u4YLm5xKJL0" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Интерактивная текстовая шпаргалка -->
    <div class="content-card">
        <div class="exercise-selector-wrapper">
            <label style="font-size: 13px; font-weight: bold; color: #7f8c8d;">Быстрый выбор описания упражнения:</label>
            <select class="exercise-select-dropdown" onchange="updateText(parseInt(this.value))" id="dropdown-select">
                <option value="1">Упражнение №1</option>
                <option value="2">Упражнение №2</option>
                <option value="3">Упражнение №3</option>
                <option value="4">Упражнение №4</option>
            </select>
        </div>

        <div class="focused-exercise-card" id="text-target-zone">
            <!-- Сюда подставится текст через JavaScript -->
        </div>
    </div>
</div>

<script>
    const exercisesTextData = [
        { 
            id: 1, 
            name: "Упражнение №1", 
            short: "Голова двигается строго ВВЕРХ и ВНИЗ, взгляд зафиксирован прямо.",
            desc: "<strong>Техника выполнения:</strong> Смотрите прямо перед собой в воображаемую точку на экране. Плавно поднимите голову вверх (мышцы шеи растягиваются), удерживая взгляд. Затем плавно опустите голову вниз, стараясь прижать подбородок к груди. Взгляд ни на секунду не отрывается от центра."
        },
        { 
            id: 2, 
            name: "Упражнение №2", 
            short: "Голова повернута ВПРАВО, и в этом положении совершает наклоны вверх-вниз.",
            desc: "<strong>Техника выполнения:</strong> Вы делаете абсолютно то же самое, что и в Упражнении №1, только предварительно повернув голову вправо. Из этого положения наклоняйте голову назад и вперед к плечу. Взгляд косится влево, удерживая центральную точку."
        },
        { 
            id: 3, 
            name: "Упражнение №3", 
            short: "Голова повернута ВЛЕВО, и совершает наклоны вверх-вниз.",
            desc: "<strong>Техника выполнения:</strong> То же самое, что и в предыдущем упражнении, только голову поворачиваем влево. Из этого положения поднимайте голову вверх и опускайте вниз. Глаза компенсируют поворот и смотрят прямо перед собой."
        },
        { 
            id: 4, 
            name: "Упражнение №4", 
            short: "Повороты лица ВПРАВО и ВЛЕВО по горизонтали.",
            desc: "<strong>Техника выполнения:</strong> Голова совершает классические повороты из стороны в сторону. Лицо поворачивается вправо, затем влево. В обоих положениях глаза компенсируют поворот шеи и удерживают взгляд по центру экрана."
        }
    ];

    function updateText(id) {
        const data = exercisesTextData.find(e => e.id === id);
        if (!data) return;

        document.getElementById('text-target-zone').innerHTML = `
            <h3 style="margin-top:0; color: #2c3e50;">${data.name}</h3>
            <div class="ex-short-brief">🎯 Суть: ${data.short}</div>
            <div class="ex-full-details">${data.desc}</div>
        `;
    }

    // Инициализация при первой загрузке (показываем первое упражнение)
    updateText(1);
</script>
</body>
</html>
