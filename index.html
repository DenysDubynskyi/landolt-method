<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Методика DD — Интерактивное обучение</title>
    <style>
        :root {
            --primary-color: #007bff; 
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
            --card-bg: #ffffff;
            --sub-bg: #2f3640;
            --sub-text: #ffffff;
            --btn-theme-bg: #28a745; 
        }

        body.green-theme {
            --primary-color: #28a745; 
            --bg-color: #f0f7f4;
            --text-color: #1e3020;
            --border-color: #cfe2ce;
            --card-bg: #ffffff;
            --sub-bg: #1e3020;
            --sub-text: #ffffff;
            --btn-theme-bg: #007bff; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .header-wrapper { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); width: 100%; }
        header { max-width: 900px; margin: 0 auto; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-weight: bold; font-size: 20px; color: var(--primary-color); }
        .controls-panel { display: flex; align-items: center; gap: 15px; }

        .theme-toggle-btn {
            background-color: var(--btn-theme-bg); color: white; border: none; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px;
        }

        .lang-selector { display: flex; gap: 5px; }
        .lang-btn { background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .lang-btn.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        .steps-nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .step-tab { padding: 10px 18px; background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: 500; font-size: 13px; }
        .step-tab.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* ПАНЕЛЬ ПЕРЕКЛЮЧЕНИЯ РЕЖИМОВ */
        .mode-switcher-panel { display: none; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; border: 2px solid var(--border-color); background-color: var(--card-bg); color: var(--text-color); font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 14px; transition: all 0.2s; }
        .mode-btn.active { border-color: var(--primary-color); background-color: var(--primary-color); color: white; }

        .visual-display-zone { position: relative; width: 100%; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #000; margin-bottom: 20px; }
        
        /* ЗОНА ВИДЕО */
        .video-wrapper { padding-bottom: 56.25%; height: 0; position: relative; display: block; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ЗОНА АТЛАСА (АНИМАЦИИ) */
        .atlas-wrapper { display: none; height: 400px; background-color: #2c3e50; position: relative; color: white; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        
        /* Стили демонстрационного анимационного ряда */
        .animation-screen { width: 120px; height: 120px; border-radius: 50%; background-color: rgba(255,255,255,0.1); border: 3px dashed rgba(255,255,255,0.4); display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 20px; }
        .moving-dot { width: 30px; height: 30px; background-color: #55efc4; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; position: absolute; box-shadow: 0 0 15px #55efc4; }
        
        /* Траектории для разных типов упражнений */
        .anim-vertical { animation: moveVert 2s infinite ease-in-out; }
        .anim-horizontal { animation: moveHoriz 2s infinite ease-in-out; }
        .anim-diagonal-1 { animation: moveDiag1 2s infinite ease-in-out; }
        .anim-diagonal-2 { animation: moveDiag2 2s infinite ease-in-out; }
        .anim-circle { animation: moveCircle 3s infinite linear; }
        .anim-static { scale: 1.2; }

        @keyframes moveVert { 0%, 100% { top: 10px; } 50% { top: 80px; } }
        @keyframes moveHoriz { 0%, 100% { left: 10px; } 50% { left: 80px; } }
        @keyframes moveDiag1 { 0%, 100% { top: 10px; left: 10px; } 50% { top: 80px; left: 80px; } }
        @keyframes moveDiag2 { 0%, 100% { top: 80px; left: 10px; } 50% { top: 10px; left: 80px; } }
        @keyframes moveCircle { 0% { transform: rotate(0deg) translate(40px) rotate(0deg); } 100% { transform: rotate(360deg) translate(40px) rotate(-360deg); } }

        .atlas-controls { display: flex; gap: 5px; justify-content: center; align-items: center; width: 100%; flex-wrap: wrap; margin-top: auto; }
        .atlas-nav-btn { background-color: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .atlas-nav-btn:hover { background-color: rgba(255,255,255,0.3); }
        .atlas-nav-btn.active { background-color: var(--primary-color); }

        .subtitles-box { background-color: var(--sub-bg); color: var(--sub-text); padding: 12px 15px; border-radius: 8px; font-size: 14px; text-align: center; border-left: 5px solid var(--primary-color); margin-bottom: 20px; }

        .content-card { background-color: var(--card-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
        .content-card h2 { margin-top: 0; font-size: 20px; color: var(--text-color); margin-bottom: 15px; }

        .summary-box { background-color: rgba(0, 123, 255, 0.03); border-left: 4px solid var(--primary-color); padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .summary-box h3 { margin: 0 0 8px 0; font-size: 15px; color: var(--primary-color); }
        .summary-box p { margin: 0; font-size: 14px; color: var(--text-color); }

        .exercises-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .exercise-item { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 15px; cursor: pointer; transition: all 0.2s; display: flex; gap: 15px; align-items: center; }
        .exercise-item:hover { border-color: var(--primary-color); background-color: rgba(0, 123, 255, 0.01); }
        .exercise-item.active { border-color: var(--primary-color); background-color: rgba(0, 123, 255, 0.04); box-shadow: inset 4px 0 0 var(--primary-color); }
        .exercise-info { flex-grow: 1; }
        .exercise-item h4 { margin: 0 0 4px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .time-tag { font-size: 11px; color: white; background-color: var(--primary-color); padding: 2px 7px; border-radius: 10px; font-weight: bold; }
        .exercise-item p { margin: 0; font-size: 13px; color: #7f8c8d; line-height: 1.4; }

        .full-text-accordion { border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; margin-top: 15px; }
        .accordion-trigger { width: 100%; background-color: #f8f9fa; border: none; padding: 12px 15px; text-align: left; font-weight: bold; font-size: 13.5px; color: var(--text-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-trigger:hover { background-color: #e9ecef; }
        .accordion-content { display: none; padding: 15px; background-color: #ffffff; border-top: 1px solid var(--border-color); font-size: 14px; color: #34495e; max-height: 300px; overflow-y: auto; }

        .download-box { display: flex; gap: 15px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 12px; text-align: center; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 13px; display: inline-block; border: none; cursor: pointer; }
        .btn-blue { background-color: #007bff; }
        .btn-green { background-color: #28a745; }

        @media (max-width: 600px) {
            .download-box { flex-direction: column; gap: 10px; }
            .content-card { padding: 15px; }
            header { justify-content: center; text-align: center; }
            .atlas-wrapper { height: 320px; }
        }
    </style>
</head>
<body>

<div class="header-wrapper">
    <header>
        <div class="logo">Методика DD</div>
        <div class="controls-panel">
            <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()">Переключить на Зелёную тему</button>
            <div class="lang-selector">
                <button class="lang-btn active">RU</button>
                <button class="lang-btn">UA</button>
                <button class="lang-btn">EN</button>
            </div>
        </div>
    </header>
</div>

<div class="container">
    <!-- Навигация по Шагам -->
    <div class="steps-nav">
        <button class="step-tab" onclick="switchStep(1, this)">Шаг 1</button>
        <button class="step-tab" onclick="switchStep(2, this)">Шаг 2</button>
        <button class="step-tab" onclick="switchStep(3, this)">Шаг 3</button>
        <button class="step-tab" onclick="switchStep(4, this)">Шаг 4</button>
        <button class="step-tab" onclick="switchStep(5, this)">Шаг 5</button>
        <button class="step-tab" onclick="switchStep(6, this)">Шаг 6</button>
        <button class="step-tab" onclick="switchStep(7, this)">Шаг 7</button>
        <button class="step-tab" onclick="switchStep(8, this)">Шаг 8</button>
    </div>

    <!-- Две кнопки переключения режимов (Видео / Атлас) -->
    <div class="mode-switcher-panel" id="mode-panel">
        <button class="mode-btn active" id="btn-mode-video" onclick="setAppMode('video')">📺 Режим: Видео-урок</button>
        <button class="mode-btn" id="btn-mode-atlas" onclick="setAppMode('atlas')">🔄 Режим: Интерактивный Атлас</button>
    </div>

    <!-- Интерактивная Визуальная Зона -->
    <div class="visual-display-zone">
        <!-- Блок стандартного Видео -->
        <div class="video-wrapper" id="video-zone">
            <iframe id="video-player" src="" allowfullscreen></iframe>
        </div>

        <!-- Блок Атласа (Анимаций/Графики) вместо видео -->
        <div class="atlas-wrapper" id="atlas-zone">
            <h3 id="atlas-title" style="margin: 0 0 5px 0; font-size: 16px; color: #55efc4;">Упражнение №1</h3>
            <p id="atlas-mini-desc" style="margin: 0 0 15px 0; font-size: 13px; color: #b2bec3; text-align: center;">Траектория движения</p>
            
            <div class="animation-screen">
                <!-- Внутри этого круга точка имитирует вектор движения головы или взгляда -->
                <div class="moving-dot anim-vertical" id="animated-vector">👀</div>
            </div>

            <!-- Цифровая навигация внутри Атласа -->
            <div class="atlas-controls" id="atlas-nav-buttons"></div>
        </div>
    </div>

    <div class="subtitles-box" id="subtitles">
        📋 Текстовое описание и важные нюансы текущего шага находятся чуть ниже.
    </div>

    <!-- Карточка контента и списка упражнений -->
    <div class="content-card" id="dynamic-content"></div>

    <div class="download-box">
        <button class="btn-action btn-blue">👁️ Открыть Таблицу Ландольта</button>
        <a href="#" class="btn-action btn-green">📥 Скачать Дневник (Excel)</a>
    </div>
</div>

<script>
    const videoIDs = {
        1: "MH96n6Qfn7w", 2: "I1xsAlrI7uo", 3: "FOuHh-QUEbk", 4: "2LKvutESB-I",
        5: "f2ZAKk_u4CU", 6: "u4YLm5xKJL0", 7: "aOjabwu5GzU", 8: "NnhBp5lhLZg"
    };

    const stepContents = {
        1: { title: "Шаг 1: Правила старта", summary: "В этом видео объясняется философия методики...", hasExercises: false, fullText: "Текст Шага 1..." },
        2: { title: "Шаг 2: История создания методики", summary: "Личный опыт автора...", hasExercises: false, fullText: "Текст Шага 2..." },
        3: { title: "Шаг 3: Как контролировать прогресс", summary: "Методы фиксации результатов...", hasExercises: false, fullText: "Текст Шага 3..." },
        4: { title: "Шаг 4: 5 Основных принципов", summary: "Базовая теория правильной тренировки...", hasExercises: false, fullText: "Текст Шага 4..." },
        5: { title: "Шаг 5: Подготовка рабочего места", summary: "Обустройство пространства дома...", hasExercises: false, fullText: "Текст Шага 5..." },
        
        6: {
            title: "Шаг 6: Интерактивный статический комплекс",
            summary: "11 статических упражнений. Изучайте технику через видео или переключитесь в режим «Атлас» для пошагового разбора.",
            hasExercises: true,
            fullText: "Все статические упражнения выполняются по 10 повторений...",
            items: [
                { id: 1, time: "0:10", animClass: "anim-vertical", name: "Упражнение №1", desc: "Зафиксируйте взгляд. Максимально голову назад (вдох), максимально вниз до груди (выдох). Фиксация точки." },
                { id: 2, time: "0:45", animClass: "anim-vertical", name: "Упражнение №2", desc: "Выполнение упражнения №1 (вверх-вниз), но с максимально повернутой головой вправо." },
                { id: 3, time: "1:20", animClass: "anim-vertical", name: "Упражнение №3", desc: "Выполнение упражнения №1 (вверх-вниз), но с максимально повернутой головой влево." },
                { id: 4, time: "1:55", animClass: "anim-horizontal", name: "Упражнение №4", desc: "Поворот головы вправо (вдох), затем плавно поворот влево (выдох). Взгляд удерживает точку." },
                { id: 5, time: "2:30", animClass: "anim-horizontal", name: "Упражнение №5", desc: "Выполнение упражнения №4 (влево-вправо), но с максимально запрокинутой назад головой." },
                { id: 6, time: "3:05", animClass: "anim-horizontal", name: "Упражнение №6", desc: "Выполнение упражнения №4 (влево-вправо), но с подбородком, плотно прижатым к грудной клетке." },
                { id: 7, time: "3:40", animClass: "anim-diagonal-1", name: "Упражнение №7", desc: "Движение головы по диагонали: из нижнего левого положения в верхнее правое. Постоянная фиксация точки." },
                { id: 8, time: "4:15", animClass: "anim-diagonal-2", name: "Упражнение №8", desc: "Движение по второй диагонали: из нижнего правого положения в верхнее левое." },
                { id: 9, time: "4:50", animClass: "anim-circle", name: "Упражнение №9", desc: "Круговые вращения головой по часовой стрелке. В нижней точке — фиксация." },
                { id: 10, time: "5:30", animClass: "anim-circle", name: "Упражнение №10", desc: "Круговые вращения головой против часовой стрелки. В нижней точке — фиксация." },
                { id: 11, time: "6:10", animClass: "anim-static", name: "Упражнение №11. Массаж", desc: "Закрыть глаза, мягко прижать ладонями со стороны мизинцев. По 10 мягких кругов в каждую сторону." }
            ]
        },
        7: {
            title: "Шаг 7: Динамический комплекс в движении",
            summary: "5 динамических упражнений. Синхронизация шагов, дыхания и переключения фокуса взгляда.",
            hasExercises: true,
            fullText: "Все упражнения выполняются в движении плавными шагами...",
            items: [
                { id: 1, time: "0:15", animClass: "anim-vertical", name: "Упражнение №1", desc: "Шаг вперёд (вдох + фиксация на ближней точке), движение назад (выдох + удержание точки)." },
                { id: 2, time: "1:00", animClass: "anim-horizontal", name: "Упражнение №2", desc: "Голова повернута вправо на 90°. Движение вперёд — взгляд на точке. Движение назад — взгляд переводится на стену сзади." },
                { id: 3, time: "1:45", animClass: "anim-horizontal", name: "Упражнение №3", desc: "Зеркальное отображение упражнения №2 (Голова влево, шаг левой ногой, перевод взгляда)." },
                { id: 4, time: "2:30", animClass: "anim-diagonal-1", name: "Упражнение №4", desc: "Голова запрокинута назад. Шаг вперёд — взгляд на точку. Шаг назад — взгляд переводится максимально вверх." },
                { id: 5, time: "3:15", animClass: "anim-diagonal-2", name: "Упражнение №5", desc: "Подбородок прижат к груди. Вперёд — фиксация на точке. Назад — перевод взгляда максимально вниз." }
            ]
        },
        8: { title: "Шаг 8: Результаты и мотивация", summary: "Подведение итогов...", hasExercises: false, fullText: "Текст Шага 8..." }
    };

    let currentStep = 1;
    let appMode = "video"; // Доступные режимы: "video" или "atlas"
    let activeExerciseID = 1; // Текущее выбранное упражнение в комплексе

    const exerciseTimestamps = {
        6: { 1: 10, 2: 45, 3: 80, 4: 115, 5: 150, 6: 185, 7: 220, 8: 255, 9: 290, 10: 330, 11: 370 },
        7: { 1: 15, 2: 60, 3: 105, 4: 150, 5: 195 }
    };

    function windowLoadInit() {
        const firstTab = document.querySelector('.steps-nav .step-tab:first-child');
        if (firstTab) firstTab.classList.add('active');
        document.getElementById('video-player').src = "https://www.youtube.com/embed/" + videoIDs[1] + "?enablejsapi=1";
        updateContentCard(1);
    }
    window.onload = windowLoadInit;

    function switchStep(stepNum, element) {
        currentStep = stepNum;
        activeExerciseID = 1; // сбрасываем на первое упражнение
        
        document.querySelectorAll('.step-tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');

        // Показываем или скрываем панель переключения режимов (нужна только для 6 и 7)
        const modePanel = document.getElementById('mode-panel');
        if (stepNum === 6 || stepNum === 7) {
            modePanel.style.display = "flex";
        } else {
            modePanel.style.display = "none";
            setAppMode('video'); // Принудительно возвращаем видео на обычных шагах
        }

        resetVideoSource(stepNum, 0);
        updateContentCard(stepNum);
        updateSubtitlesText(stepNum);
    }

    function setAppMode(mode) {
        appMode = mode;
        const videoZone = document.getElementById('video-zone');
        const atlasZone = document.getElementById('atlas-zone');
        const btnVideo = document.getElementById('btn-mode-video');
        const btnAtlas = document.getElementById('btn-mode-atlas');

        if (mode === 'video') {
            videoZone.style.display = "block";
            atlasZone.style.display = "none";
            btnVideo.classList.add('active');
            btnAtlas.classList.remove('active');
        } else {
            videoZone.style.display = "none";
            atlasZone.style.display = "flex";
            btnVideo.classList.remove('active');
            btnAtlas.classList.add('active');
            renderAtlasNavigation();
            selectExercise(activeExerciseID); // Обновляем графику под текущее упр.
        }
    }

    function resetVideoSource(stepNum, startSeconds) {
        let url = "https://www.youtube.com/embed/" + videoIDs[stepNum] + "?enablejsapi=1";
        if (startSeconds > 0) {
            url += "&autoplay=1&start=" + startSeconds;
        }
        document.getElementById('video-player').src = url;
    }

    function updateSubtitlesText(stepNum) {
        const sub = document.getElementById('subtitles');
        if (stepContents[stepNum].hasExercises) {
            sub.innerHTML = "🎯 Вы можете переключаться между видео и анимированным атласом. Текст внизу всегда синхронизирован!";
        } else {
            sub.innerHTML = "📋 Текстовое описание и важные нюансы текущего шага находятся чуть ниже.";
        }
    }

    function updateContentCard(stepNum) {
        const data = stepContents[stepNum];
        const container = document.getElementById('dynamic-content');
        if (!data || !container) return;

        let exercisesHTML = '';
        if (data.hasExercises) {
            exercisesHTML += `<div class="exercises-list">`;
            data.items.forEach(item => {
                exercisesHTML += `
                    <div class="exercise-item" id="ex-item-${item.id}" onclick="handleExerciseClick(${item.id})">
                        <div class="exercise-info">
                            <h4><span>${item.name}</span> <span class="time-tag">${item.time}</span></h4>
                            <p>${item.desc}</p>
                        </div>
                    </div>
                `;
            });
            exercisesHTML += `</div>`;
        }

        container.innerHTML = `
            <h2>${data.title}</h2>
            <div class="summary-box">
                <h3>💡 О чём этот шаг:</h3>
                <p>${data.summary}</p>
            </div>
            ${exercisesHTML}
            <div class="full-text-accordion">
                <button class="accordion-trigger" onclick="toggleAccordion()">
                    📖 Показать полное текстовое руководство к шагу <span id="arrow-icon">▼</span>
                </button>
                <div class="accordion-content" id="accordion-text">${data.fullText}</div>
            </div>
        `;

        if (data.hasExercises) {
            highlightTextItem(activeExerciseID);
        }
    }

    // Обработка клика по упражнению из нижнего списка
    function handleExerciseClick(itemId) {
        activeExerciseID = itemId;
        if (appMode === 'video') {
            const seconds = exerciseTimestamps[currentStep][itemId] || 0;
            resetVideoSource(currentStep, seconds);
            document.getElementById('video-zone').scrollIntoView({ behavior: 'smooth' });
        } else {
            selectExercise(itemId);
            document.getElementById('atlas-zone').scrollIntoView({ behavior: 'smooth' });
        }
        highlightTextItem(itemId);
    }

    // Обновление состояния внутри верхнего Атласа
    function selectExercise(itemId) {
        activeExerciseID = itemId;
        const stepData = stepContents[currentStep];
        const itemData = stepData.items.find(i => i.id === itemId);
        
        if (!itemData) return;

        // 1. Меняем заголовки внутри Атласа
        document.getElementById('atlas-title').innerText = itemData.name;
        document.getElementById('atlas-mini-desc').innerText = "Направление вектора: " + itemData.time;

        // 2. Меняем класс анимации у точки (имитация траектории движения)
        const dot = document.getElementById('animated-vector');
        dot.className = "moving-dot " + itemData.animClass;

        // 3. Подсвечиваем активную цифру в кнопках Атласа
        document.querySelectorAll('.atlas-nav-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`atlas-nav-btn-${itemId}`);
        if (activeBtn) activeBtn.classList.add('active');

        // 4. Синхронно подсвечиваем карточку в нижнем текстовом списке
        highlightTextItem(itemId);
    }

    function highlightTextItem(itemId) {
        document.querySelectorAll('.exercise-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`ex-item-${itemId}`);
        if (activeItem) activeItem.classList.add('active');
    }

    // Генерация кнопок пагинации (1, 2, 3...) внутри Атласа
    function renderAtlasNavigation() {
        const container = document.getElementById('atlas-nav-buttons');
        const stepData = stepContents[currentStep];
        if (!stepData || !stepData.hasExercises) return;

        let html = `<button class="atlas-nav-btn" onclick="moveAtlasPrev()">◀ Назад</button>`;
        stepData.items.forEach(item => {
            html += `<button class="atlas-nav-btn" id="atlas-nav-btn-${item.id}" onclick="selectExercise(${item.id})">${item.id}</button>`;
        });
        html += `<button class="atlas-nav-btn" onclick="moveAtlasNext()">Вперед ▶</button>`;
        container.innerHTML = html;
    }

    function moveAtlasPrev() {
        if (activeExerciseID > 1) { selectExercise(activeExerciseID - 1); }
    }

    function moveAtlasNext() {
        const max = stepContents[currentStep].items.length;
        if (activeExerciseID < max) { selectExercise(activeExerciseID + 1); }
    }

    function toggleAccordion() {
        const content = document.getElementById('accordion-text');
        const arrow = document.getElementById('arrow-icon');
        if (content.style.display === 'block') { content.style.display = 'none'; arrow.innerText = '▼'; }
        else { content.style.display = 'block'; arrow.innerText = '▲'; }
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        body.classList.toggle('green-theme');
        btn.innerText = body.classList.contains('green-theme') ? "Переключить на Синюю тему" : "Переключить на Зелёную тему";
    }
</script>

</body>
</html>
