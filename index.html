<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Методика DD — Иллюстрированный Атлас</title>
    <style>
        :root {
            --primary-color: #007bff; 
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
            --card-bg: #ffffff;
            --sub-bg: #2f3640;
            --sub-text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        /* Навигация по шагам */
        .steps-nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .step-tab { padding: 10px 18px; background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: 500; font-size: 13px; }
        .step-tab.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* Переключатель режимов */
        .mode-switcher-panel { display: none; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; border: 2px solid var(--border-color); background-color: var(--card-bg); color: var(--text-color); font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 14px; }
        .mode-btn.active { border-color: var(--primary-color); background-color: var(--primary-color); color: white; }

        .visual-display-zone { position: relative; width: 100%; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #000; margin-bottom: 20px; }
        
        .video-wrapper { padding-bottom: 56.25%; height: 0; position: relative; display: block; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ИЛЛЮСТРИРОВАННЫЙ АТЛАС */
        .atlas-wrapper { display: none; min-height: 450px; background: linear-gradient(to bottom, #7ed6df, #eccc68); position: relative; color: #2c3e50; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; }
        
        /* Экран демонстрации двух кадров */
        .flipbook-screen { display: flex; gap: 40px; justify-content: center; align-items: center; margin: 20px 0; width: 100%; flex-wrap: wrap; }
        
        .frame-box { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.6); padding: 15px; border-radius: 12px; border: 2px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .frame-label { font-weight: bold; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #2f3542; }

        /* КОНСТРУКТОР ГОЛОВЫ НА CSS (Стилизация под мальчика) */
        .boy-head-avatar { width: 110px; height: 125px; background-color: #ffdfba; border-radius: 55px 55px 50px 50px; position: relative; box-shadow: 0 6px 15px rgba(0,0,0,0.1); transition: transform 0.2s ease; }
        
        /* Волосы мальчиковые */
        .boy-hair { position: absolute; top: -12px; left: -5px; width: 120px; height: 50px; background-color: #6d4c41; border-radius: 60px 60px 20px 20px; }
        .boy-hair-fringe { position: absolute; top: 25px; left: 10px; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 15px solid #6d4c41; }
        .boy-hair-fringe.f2 { left: 40px; border-top-width: 18px; }
        .boy-hair-fringe.f3 { left: 70px; }

        /* Уши */
        .boy-ear { position: absolute; width: 18px; height: 26px; background-color: #ffdfba; border-radius: 50%; top: 55px; }
        .boy-ear.left { left: -14px; }
        .boy-ear.right { right: -14px; }

        /* Глаза */
        .boy-eyes-container { display: flex; gap: 20px; position: absolute; top: 55px; left: 22px; }
        .boy-eye { width: 22px; height: 22px; background: white; border-radius: 50%; position: relative; border: 1px solid #dcdde1; display: flex; justify-content: center; align-items: center; }
        .boy-pupil { width: 11px; height: 11px; background: #333; border-radius: 50%; position: absolute; display: flex; justify-content: center; align-items: center; }
        .boy-pupil::after { content: ''; width: 4px; height: 4px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; } /* Блик */

        /* Рот (улыбка) */
        .boy-mouth { position: absolute; bottom: 20px; left: 35px; width: 40px; height: 20px; border-bottom: 4px solid #c0392b; border-radius: 0 0 20px 20px; transition: all 0.2s; }

        /* ИЗМЕНЕНИЯ ПОЛОЖЕНИЙ ГОЛОВЫ ДЛЯ РАЗНЫХ КАДРОВ */
        /* Упр 1: Голова вверх / вниз */
        .look-up { transform: translateY(-12px) scaleY(0.95); }
        .look-down { transform: translateY(12px) scaleY(1.05); }
        
        /* Упр 2: Поворот вправо + наклон */
        .turn-right-up { transform: translateX(25px) scaleX(0.9) translateY(-10px); }
        .turn-right-down { transform: translateX(25px) scaleX(0.9) translateY(10px); }

        /* Упр 3: Поворот влево + наклон */
        .turn-left-up { transform: translateX(-25px) scaleX(0.9) translateY(-10px); }
        .turn-left-down { transform: translateX(-25px) scaleX(0.9) translateY(10px); }

        /* Навигация Атласа */
        .atlas-controls { display: flex; gap: 5px; justify-content: center; align-items: center; width: 100%; flex-wrap: wrap; margin-top: 15px; }
        .atlas-nav-btn { background-color: rgba(0, 0, 0, 0.6); border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .atlas-nav-btn.active { background-color: var(--primary-color); }

        /* Карточка описания */
        .content-card { background-color: var(--card-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
        .summary-box { background-color: rgba(0, 123, 255, 0.03); border-left: 4px solid var(--primary-color); padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .exercise-selector-wrapper { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .exercise-select-dropdown { width: 100%; padding: 12px 15px; font-size: 15px; font-weight: bold; color: var(--text-color); background-color: var(--card-bg); border: 2px solid var(--primary-color); border-radius: 8px; cursor: pointer; }
        
        /* Двухзонное отображение текста */
        .focused-exercise-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; box-shadow: inset 5px 0 0 var(--primary-color); }
        .ex-short-brief { font-size: 15px; font-weight: 600; color: var(--primary-color); margin-bottom: 12px; background: rgba(0,123,255,0.05); padding: 8px 12px; border-radius: 4px; }
        .ex-full-details { font-size: 14px; color: #34495e; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <!-- Навигация по Шагам -->
    <div class="steps-nav">
        <button class="step-tab" onclick="switchStep(5, this)">Шаг 5</button>
        <button class="step-tab active" onclick="switchStep(6, this)">Шаг 6 (Тренажер)</button>
        <button class="step-tab" onclick="switchStep(7, this)">Шаг 7</button>
    </div>

    <!-- Переключатель Видео / Атлас -->
    <div class="mode-switcher-panel" id="mode-panel" style="display: flex;">
        <button class="mode-btn" id="btn-mode-video" onclick="setAppMode('video')">📺 Режим: Видео-урок</button>
        <button class="mode-btn active" id="btn-mode-atlas" onclick="setAppMode('atlas')">🔄 Режим: Двухкадровый Атлас</button>
    </div>

    <div class="visual-display-zone">
        <!-- Зона Видео -->
        <div class="video-wrapper" id="video-zone" style="display: none;">
            <iframe id="video-player" src="https://www.youtube.com/embed/u4YLm5xKJL0" allowfullscreen></iframe>
        </div>

        <!-- Зона Иллюстрированного Атласа -->
        <div class="atlas-wrapper" id="atlas-zone" style="display: flex;">
            <div style="text-align: center;">
                <h3 id="atlas-title" style="margin: 0; font-size: 18px;">Упражнение №1</h3>
                <p id="atlas-mini-desc" style="margin: 5px 0 0 0; font-size: 13px; color: #57606f;">Голова двигается, но взгляд строго в экран!</p>
            </div>
            
            <!-- ДВУХКАДРОВЫЙ ЭКРАН (ФЛИПБУК) -->
            <div class="flipbook-screen">
                
                <!-- Кадр А -->
                <div class="frame-box">
                    <div class="frame-label">Положение А</div>
                    <div class="boy-head-avatar" id="head-frame-a">
                        <div class="boy-hair"><div class="boy-hair-fringe"></div><div class="boy-hair-fringe f2"></div><div class="boy-hair-fringe f3"></div></div>
                        <div class="boy-ear left"></div><div class="boy-ear right"></div>
                        <div class="boy-eyes-container">
                            <div class="boy-eye"><div class="boy-pupil" id="pupil-a1"></div></div>
                            <div class="boy-eye"><div class="boy-pupil" id="pupil-a2"></div></div>
                        </div>
                        <div class="boy-mouth"></div>
                    </div>
                </div>

                <!-- Кадр Б -->
                <div class="frame-box">
                    <div class="frame-label">Положение Б</div>
                    <div class="boy-head-avatar" id="head-frame-b">
                        <div class="boy-hair"><div class="boy-hair-fringe"></div><div class="boy-hair-fringe f2"></div><div class="boy-hair-fringe f3"></div></div>
                        <div class="boy-ear left"></div><div class="boy-ear right"></div>
                        <div class="boy-eyes-container">
                            <div class="boy-eye"><div class="boy-pupil" id="pupil-b1"></div></div>
                            <div class="boy-eye"><div class="boy-pupil" id="pupil-b2"></div></div>
                        </div>
                        <div class="boy-mouth"></div>
                    </div>
                </div>

            </div>

            <!-- Кнопки управления внутри Атласа -->
            <div class="atlas-controls" id="atlas-nav-buttons"></div>
        </div>
    </div>

    <!-- Текстовый блок (Кратко + Полное описание) -->
    <div class="content-card" id="dynamic-content"></div>
</div>

<script>
    // Наша база данных упражнений с настройками положений головы и зрачков
    const exercisesData = [
        { 
            id: 1, 
            name: "Упражнение №1", 
            short: "Голова ходит строго ВВЕРХ и ВНИЗ, взгляд зафиксирован прямо.",
            desc: "<strong>Техника выполнения:</strong> Смотрите прямо перед собой в воображаемую точку на экране. На Кадре А плавно поднимите голову вверх (мышцы шеи растягиваются). На Кадре Б плавно опустите голову вниз, стараясь прижать подбородок к груди. <strong>Поведение глаз:</strong> Обратите внимание, что на обоих кадрах зрачки смещаются противоположно движению головы, чтобы взгляд оставался строго на месте.",
            classA: "look-up", 
            classB: "look-down",
            pupilA: "bottom: 0;", // Когда голова вверху, зрачки косятся вниз
            pupilB: "top: 0;"    // Когда голова внизу, зрачки косятся вверх
        },
        { 
            id: 2, 
            name: "Упражнение №2", 
            short: "Голова повернута ВПРАВО, и в этом положении совершает наклоны вверх-вниз.",
            desc: "<strong>Техника выполнения:</strong> Поверните лицо максимально вправо (в сторону правого плеча). Из этого положения наклоняйте голову назад (Кадр А) и вперед к плечу (Кадр Б). <strong>Поведение глаз:</strong> Лицо мальчика повернуто вбок, но его зрачки максимально скошены влево — он продолжает коситься прямо на вас!",
            classA: "turn-right-up", 
            classB: "turn-right-down",
            pupilA: "left: 0; bottom: 2px;", // Глаза скошены влево
            pupilB: "left: 0; top: 2px;"
        },
        { 
            id: 3, 
            name: "Упражнение №3", 
            short: "Голова повернута ВЛЕВО, и совершает наклоны вверх-вниз.",
            desc: "<strong>Техника выполнения:</strong> Поверните лицо максимально влево. Из этого положения поднимайте голову вверх (Кадр А) и опускайте вниз (Кадр Б). <strong>Поведение глаз:</strong> Лицо повернуто налево, но зрачки зафиксированы в правом углу глазниц, удерживая центральную точку.",
            classA: "turn-left-up", 
            classB: "turn-left-down",
            pupilA: "right: 0; bottom: 2px;", // Глаза скошены вправо
            pupilB: "right: 0; top: 2px;"
        },
        { 
            id: 4, 
            name: "Упражнение №4", 
            short: "Повороты лица ВПРАВО и ВЛЕВО по горизонтали.",
            desc: "<strong>Техника выполнения:</strong> Голова совершает классические повороты из стороны в сторону. Кадр А — лицо повернуто вправо, Кадр Б — лицо повернуто влево. <strong>Поведение глаз:</strong> В обоих положениях глаза компенсируют поворот шеи и удерживают взгляд по центру.",
            classA: "turn-right-down", 
            classB: "turn-left-down",
            pupilA: "left: 0; top: 4px;", 
            pupilB: "right: 0; top: 4px;"
        }
    ];

    let activeID = 1;
    let currentMode = "atlas";

    function init() {
        renderAtlasNavigation();
        updateUI(1);
    }
    window.onload = init;

    function setAppMode(mode) {
        currentMode = mode;
        document.getElementById('video-zone').style.display = mode === 'video' ? 'block' : 'none';
        document.getElementById('atlas-zone').style.display = mode === 'atlas' ? 'flex' : 'none';
        
        document.getElementById('btn-mode-video').classList.toggle('active', mode === 'video');
        document.getElementById('btn-mode-atlas').classList.toggle('active', mode === 'atlas');
    }

    function switchStep(stepNum, btn) {
        document.querySelectorAll('.step-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        alert("Вы переключились на Шаг " + stepNum + ". Интерактивный тренажер работает на Шаге 6!");
    }

    function renderAtlasNavigation() {
        const container = document.getElementById('atlas-nav-buttons');
        let html = '';
        exercisesData.forEach(ex => {
            html += `<button class="atlas-nav-btn" id="nav-idx-${ex.id}" onclick="updateUI(${ex.id})">${ex.id}</button>`;
        });
        container.innerHTML = html;
    }

    function updateUI(id) {
        activeID = id;
        const data = exercisesData.find(e => e.id === id);
        if (!data) return;

        // 1. Обновляем заголовки Атласа
        document.getElementById('atlas-title').innerText = data.name;
        
        // 2. Обновляем визуальные классы анимации головы мальчика
        document.getElementById('head-frame-a').className = "boy-head-avatar " + data.classA;
        document.getElementById('head-frame-b').className = "boy-head-avatar " + data.classB;

        // 3. Смещаем положение зрачков (направление взгляда)
        document.getElementById('pupil-a1').style = data.pupilA;
        document.getElementById('pupil-a2').style = data.pupilA;
        document.getElementById('pupil-b1').style = data.pupilB;
        document.getElementById('pupil-b2').style = data.pupilB;

        // 4. Подсвечиваем активную кнопку
        document.querySelectorAll('.atlas-nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav-idx-${id}`).classList.add('active');

        // 5. Перерисовываем Текстовую Карточку (Кратко сверху + Полно снизу)
        const contentZone = document.getElementById('dynamic-content');
        contentZone.innerHTML = `
            <div class="exercise-selector-wrapper">
                <label style="font-size: 13px; font-weight: bold; color: #7f8c8d;">Быстрый выбор упражнения:</label>
                <select class="exercise-select-dropdown" onchange="updateUI(parseInt(this.value))" id="dropdown-select">
                    ${exercisesData.map(e => `<option value="${e.id}" ${e.id === id ? 'selected' : ''}>${e.name}</option>`).join('')}
                </select>
            </div>

            <div class="focused-exercise-card">
                <h3 style="margin-top:0; color: #2c3e50;">${data.name}</h3>
                <div class="ex-short-brief">🎯 Краткое содержание: ${data.short}</div>
                <div class="ex-full-details">${data.desc}</div>
            </div>
        `;
    }
</script>
</body>
</html>
