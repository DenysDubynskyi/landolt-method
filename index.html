<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Методика DD — Официальный сайт</title>
    <style>
        :root {
            --primary-color: #007bff; 
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px 15px; }

        /* ВЕРХНЯЯ ШАПКА САЙТА */
        header { background-color: #2c3e50; color: white; padding: 20px 0; border-radius: 8px 8px 0 0; margin-bottom: 5px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .tagline { font-size: 14px; color: #bdc3c7; font-style: italic; }

        /* ПОЛНЫЙ РЯД ИЗ 8 ШАГОВ */
        .steps-nav { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding: 15px 5px; 
            margin-bottom: 25px; 
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            scrollbar-width: thin;
        }
        .step-tab { 
            padding: 10px 16px; 
            background-color: var(--card-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-color); 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 13px; 
            white-space: nowrap;
            transition: all 0.2s;
        }
        .step-tab:hover { border-color: var(--primary-color); }
        .step-tab.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* ОСНОВНАЯ ЗОНА КОНТЕНТА ШАГА */
        .main-step-content { background-color: var(--card-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); margin-bottom: 25px; }

        /* ПЛЕЕР ВИДЕО */
        .visual-display-zone { width: 100%; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #000; margin-bottom: 25px; }
        .video-wrapper { padding-bottom: 56.25%; height: 0; position: relative; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ТРЕНАЖЕР-ШПАРГАЛКА (ДЛЯ ШАГА 6) */
        .exercise-selector-wrapper { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .exercise-select-dropdown { width: 100%; padding: 12px 15px; font-size: 15px; font-weight: bold; color: var(--text-color); border: 2px solid var(--primary-color); border-radius: 8px; cursor: pointer; outline: none; }
        
        .focused-exercise-card { border-radius: 6px; padding: 20px; box-shadow: inset 5px 0 0 var(--primary-color); background: #f8fafc; border: 1px solid var(--border-color); }
        .ex-short-brief { font-size: 14px; font-weight: 600; color: var(--primary-color); margin-bottom: 12px; background: rgba(0,123,255,0.06); padding: 8px 12px; border-radius: 4px; }
        .ex-full-details { font-size: 14px; color: #34495e; line-height: 1.6; }

        /* ПОДВАЛ С ДОКУМЕНТАМИ ДЛЯ СКАЧИВАНИЯ */
        footer { background-color: #ffffff; border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; margin-top: 30px; }
        .footer-title { font-weight: bold; margin-bottom: 15px; color: #2c3e50; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .download-links { display: flex; flex-direction: column; gap: 10px; }
        .download-btn { display: inline-flex; align-items: center; gap: 10px; color: var(--primary-color); text-decoration: none; font-weight: 500; font-size: 14px; }
        .download-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ШАПКА САЙТА -->
    <header>
        <div class="header-content">
            <div class="logo">Методика DD</div>
            <div class="tagline">Полный курс улучшения когнитивных функций</div>
        </div>
    </header>

    <!-- ПОЛНЫЙ РЯД: ВСЕ 8 ШАГОВ -->
    <div class="steps-nav">
        <button class="step-tab" onclick="switchStep(1)">Шаг 1: Введение</button>
        <button class="step-tab" onclick="switchStep(2)">Шаг 2: Теория</button>
        <button class="step-tab" onclick="switchStep(3)">Шаг 3: Тестирование</button>
        <button class="step-tab" onclick="switchStep(4)">Шаг 4: Подготовка</button>
        <button class="step-tab" onclick="switchStep(5)">Шаг 5: База</button>
        <button class="step-tab active" onclick="switchStep(6)">Шаг 6: Статика (Тренажер)</button>
        <button class="step-tab" onclick="switchStep(7)">Шаг 7: Динамика</button>
        <button class="step-tab" onclick="switchStep(8)">Шаг 8: Итоги</button>
    </div>

    <!-- ОСНОВНОЙ БЛОК КОНТЕНТА -->
    <div class="main-step-content">
        
        <!-- Видео-урок Шага 6 -->
        <div class="visual-display-zone">
            <div class="video-wrapper">
                <!-- Ссылка на ваше 6-е видео -->
                <iframe src="https://www.youtube.com/embed/u4YLm5xKJL0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Интерактивная шпаргалка к упражнениям -->
        <div class="exercise-selector-wrapper">
            <label style="font-size: 13px; font-weight: bold; color: #7f8c8d;">Быстрый выбор описания упражнения:</label>
            <select class="exercise-select-dropdown" onchange="updateText(parseInt(this.value))" id="dropdown-select">
                <option value="1">Упражнение №1</option>
                <option value="2">Упражнение №2</option>
                <option value="3">Упражнение №3</option>
                <option value="4">Упражнение №4</option>
            </select>
        </div>

        <div class="focused-exercise-card" id="text-target-zone">
            <!-- Сюда подставляется текст через JavaScript -->
        </div>

    </div>

    <!-- БЛОК СКАЧИВАНИЯ ДОКУМЕНТОВ -->
    <footer>
        <div class="footer-title">📁 Материалы для скачивания к курсу:</div>
        <div class="download-links">
            <a href="docs/metodika_dd_manual.pdf" class="download-btn" download>
                📄 Скачать методическое руководство (PDF)
            </a>
            <a href="docs/exercise_tracker.pdf" class="download-btn" download>
                📊 Скачать Дневник занятий и трекер прогресса (PDF)
            </a>
        </div>
    </footer>

</div>

<script>
    // Текстовая база данных упражнений для Шага 6
    const exercisesTextData = [
        { 
            id: 1, 
            name: "Упражнение №1", 
            short: "Голова двигается строго ВВЕРХ и ВНИЗ, взгляд зафиксирован прямо.",
            desc: "<strong>Техника выполнения:</strong> Смотрите прямо перед собой в воображаемую точку на экране. Плавно поднимите голову вверх (мышцы шеи растягиваются), удерживая взгляд. Затем плавно опустите голову вниз, стараясь прижать подбородок к груди. Взгляд ни на секунду не отрывается от центра."
        },
        { 
            id: 2, 
            name: "Упражнение №2", 
            short: "Голова повернута ВПРАВО, и в этом положении совершает наклоны вверх-вниз.",
            desc: "<strong>Техника выполнения:</strong> Вы делаете абсолютно то же самое, что и в Упражнении №1, только предварительно повернув голову вправо. Из этого положения наклоняйте голову назад и вперед к плечу. Взгляд косится влево, удерживая центральную точку."
        },
        { 
            id: 3, 
            name: "Упражнение №3", 
            short: "Голова повернута ВЛЕВО, и совершает наклоны вверх-вниз.",
            desc: "<strong>Техника выполнения:</strong> То же самое, что и в предыдущем упражнении, только голову поворачиваем влево. Из этого положения поднимайте голову вверх и опускайте вниз. Глаза компенсируют поворот и смотрят прямо перед собой."
        },
        { 
            id: 4, 
            name: "Упражнение №4", 
            short: "Повороты лица ВПРАВО и ВЛЕВО по горизонтали.",
            desc: "<strong>Техника выполнения:</strong> Голова совершает классические повороты из стороны в сторону. Лицо поворачивается вправо, затем влево. В обоих положениях глаза компенсируют поворот шеи и удерживают взгляд по центру экрана."
        }
    ];

    // Функция обновления текста упражнений
    function updateText(id) {
        const data = exercisesTextData.find(e => e.id === id);
        if (!data) return;

        document.getElementById('text-target-zone').innerHTML = `
            <h3 style="margin-top:0; color: #2c3e50;">${data.name}</h3>
            <div class="ex-short-brief">🎯 Суть: ${data.short}</div>
            <div class="ex-full-details">${data.desc}</div>
        `;
    }

    // Заглушка переключения шагов курса (чтобы кнопки шагов реагировали на нажатия)
    function switchStep(stepNum) {
        alert("Вы нажали на Шаг " + stepNum + ". В этой сборке мы детально настроили интерактивный Шаг 6. Код для остальных шагов подключается по аналогии!");
    }

    // Инициализация по умолчанию
    updateText(1);
</script>
</body>
</html>
