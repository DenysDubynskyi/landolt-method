<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Методика DD — Интерактивное обучение</title>
    <style>
        :root {
            --primary-color: #007bff; 
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
            --card-bg: #ffffff;
            --btn-theme-bg: #28a745; 
        }

        body.green-theme {
            --primary-color: #28a745; 
            --bg-color: #f0f7f4;
            --text-color: #1e3020;
            --border-color: #cfe2ce;
            --card-bg: #ffffff;
            --btn-theme-bg: #007bff; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .header-wrapper { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); width: 100%; }
        header { max-width: 900px; margin: 0 auto; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo-block { display: flex; flex-direction: column; }
        .logo { font-weight: bold; font-size: 20px; color: var(--primary-color); }
        .tagline { font-size: 13px; color: #7f8c8d; font-style: italic; margin-top: 2px; }
        
        .controls-panel { display: flex; align-items: center; gap: 15px; }
        .theme-toggle-btn {
            background-color: var(--btn-theme-bg); color: white; border: none; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px; transition: background 0.2s;
        }
        .lang-selector { display: flex; gap: 5px; }
        .lang-btn { background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .lang-btn.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        /* ПАНЕЛЬ ШАГОВ */
        .steps-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: 5px; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            border-bottom: 1px solid var(--border-color); 
        }
        .step-tab { 
            flex: 1;
            text-align: center;
            padding: 10px 5px; 
            background-color: var(--card-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-color); 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 12px; 
            white-space: nowrap;
        }
        .step-tab.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* ПЛЕЕР */
        .visual-display-zone { width: 100%; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #000; margin-bottom: 20px; }
        .video-wrapper { padding-bottom: 56.25%; height: 0; position: relative; display: block; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ИНТЕРАКТИВНЫЙ БЛОК */
        .content-card { background-color: var(--card-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); margin-bottom: 20px; }
        .exercise-selector-wrapper { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .exercise-select-dropdown { width: 100%; padding: 12px 15px; font-size: 15px; font-weight: bold; color: var(--text-color); background-color: var(--card-bg); border: 2px solid var(--primary-color); border-radius: 8px; cursor: pointer; outline: none; }
        
        .focused-exercise-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; box-shadow: inset 5px 0 0 var(--primary-color); }
        .ex-short-brief { font-size: 14px; font-weight: 600; color: var(--primary-color); margin-bottom: 12px; background: rgba(0,123,255,0.05); padding: 8px 12px; border-radius: 4px; }
        .ex-full-details { font-size: 14px; color: #34495e; line-height: 1.6; }

        /* КНОПКИ ДЕЙСТВИЯ */
        .download-box { display: flex; gap: 15px; margin-top: 25px; }
        .btn-action { flex: 1; padding: 14px; text-align: center; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; display: inline-block; border: none; cursor: pointer; transition: opacity 0.2s; }
        .btn-action:hover { opacity: 0.9; }
        .btn-blue { background-color: #007bff; }
        .btn-green { background-color: #28a745; }

        @media (max-width: 768px) {
            .steps-nav { overflow-x: auto; justify-content: flex-start; }
            .step-tab { flex: none; padding: 10px 15px; }
            .download-box { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="header-wrapper">
    <header>
        <div class="logo-block">
            <div class="logo">Методика DD</div>
            <div class="tagline">Полный курс улучшения когнитивных функций</div>
        </div>
        <div class="controls-panel">
            <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()">Переключить на Зелёную тему</button>
            <div class="lang-selector">
                <button class="lang-btn active">RU</button>
                <button class="lang-btn">UA</button>
                <button class="lang-btn">EN</button>
            </div>
        </div>
    </header>
</div>

<div class="container">
    
    <!-- НАВИГАЦИЯ МЕЖДУ ШАГАМИ -->
    <div class="steps-nav">
        <button class="step-tab" id="step-tab-1" onclick="switchStep(1)">Шаг 1</button>
        <button class="step-tab" id="step-tab-2" onclick="switchStep(2)">Шаг 2</button>
        <button class="step-tab" id="step-tab-3" onclick="switchStep(3)">Шаг 3</button>
        <button class="step-tab" id="step-tab-4" onclick="switchStep(4)">Шаг 4</button>
        <button class="step-tab" id="step-tab-5" onclick="switchStep(5)">Шаг 5</button>
        <button class="step-tab active" id="step-tab-6" onclick="switchStep(6)">Шаг 6 (Тренажер)</button>
        <button class="step-tab" id="step-tab-7" onclick="switchStep(7)">Шаг 7</button>
        <button class="step-tab" id="step-tab-8" onclick="switchStep(8)">Шаг 8</button>
    </div>

    <!-- ДИНАМИЧЕСКИЙ ПЛЕЕР -->
    <div class="visual-display-zone">
        <div class="video-wrapper">
            <iframe id="main-video-player" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="content-card">
        <!-- Блок выбора упражнений -->
        <div class="exercise-selector-wrapper" id="exercise-selector-block">
            <label style="font-size: 13px; font-weight: bold; color: #7f8c8d;">Быстрый выбор описания упражнения:</label>
            <select class="exercise-select-dropdown" onchange="updateExerciseText(parseInt(this.value))" id="dropdown-select">
                <!-- Опции генерируются через JS -->
            </select>
        </div>

        <div class="focused-exercise-card" id="text-target-zone">
            <!-- Текст подгружается скриптом -->
        </div>
    </div>

    <!-- ТОЧНЫЕ НАЗВАНИЯ ВАШИХ ФАЙЛОВ С GITHUB -->
    <div class="download-box">
        <a href="landolt_table.pdf" target="_blank" class="btn-action btn-blue">👁️ Открыть / Распечатать Таблицу Ландольта</a>
        <a href="vision_diary.xlsx" download class="btn-action btn-green">📥 Скачать Дневник тренировок (Excel)</a>
    </div>

</div>

<script>
    // БАЗА ДАННЫХ ШАГОВ С РЕАЛЬНЫМИ ВИДЕОРОЛИКАМИ
    const stepsData = {
        1: { name: "Шаг 1: Перед тем как вы начнёте", video: "https://www.youtube.com/embed/MH96n6Qfn7w", desc: "Вводное занятие. Настройка правильного психологического настроя перед тренировками и разбор структуры курса." },
        2: { name: "Шаг 2: Почему я решил создать собственную систему восстановления зрения", video: "https://www.youtube.com/embed/I1xsAlrI7uo", desc: "История автора, разбор существующих методик и научные предпосылки создания системы DD." },
        3: { name: "Шаг 3: Как я проверял эффективность своей системы", video: "https://www.youtube.com/embed/FOuHh-QUEbk", desc: "Практические результаты, методы замера показателей внимания и концентрации на основе тестов." },
        4: { name: "Шаг 4: Основные принципы системы", video: "https://www.youtube.com/embed/2LKvutESB-I", desc: "Фундаментальные правила выполнения тренировок, регулярность и ключевые ошибки, которых стоит избегать." },
        5: { name: "Шаг 5: Подготовка к занятиям", video: "https://www.youtube.com/embed/f2ZAKk_u4CU", desc: "Организация рабочего пространства, расслабление шейно-воротниковой зоны и базовая разминка глаз." },
        6: { name: "Шаг 6: Статические упражнения", video: "https://www.youtube.com/embed/u4YLm5xKJL0", isExerciseStep: true, type: "static" },
        7: { name: "Шаг 7: Динамические упражнения", video: "https://www.youtube.com/embed/aOjabwu5GzU", isExerciseStep: true, type: "dynamic" },
        8: { name: "Шаг 8: Результаты, которые я получил", video: "https://www.youtube.com/embed/NnhBp5lhLZg", desc: "Анализ итоговых улучшений, фиксация прогресса в дневнике и рекомендации по поддержанию долгосрочного эффекта." }
    };

    // БАЗА 11 СТАТИЧЕСКИХ УПРАЖНЕНИЙ (ШАГ 6)
    const staticExercises = [
        { id: 1, name: "Упражнение №1", short: "Голова ВВЕРХ и ВНИЗ, взгляд зафиксирован прямо.", desc: "Смотрите прямо в воображаемую точку на экране. Плавно поднимите голову вверх, удерживая взгляд. Затем плавно опустите голову вниз, прижимая подбородок к груди. Взгляд не отрывается от центра. Повторить 10 раз." },
        { id: 2, name: "Упражнение №2", short: "Голова повернута ВПРАВО, наклоны вверх-вниз.", desc: "Поверните лицо вправо до упора. Из этого положения совершайте плавные наклоны головы вверх и вниз. Взгляд косится влево, удерживая центральную мишень." },
        { id: 3, name: "Упражнение №3", short: "Голова повернута ВЛЕВО, наклоны вверх-вниз.", desc: "Поверните лицо влево до упора. Начните плавные вертикальные движения головой вверх-вниз. Глаза скошены вправо, удерживая фиксацию на центре." },
        { id: 4, name: "Упражнение №4", short: "Повороты лица ВПРАВО и ВЛЕВО по горизонтали.", desc: "Голова совершает классические повороты из стороны в сторону (направо-налево). Глаза полностью компенсируют поворот шеи и постоянно смотрят прямо в экран." },
        { id: 5, name: "Упражнение №5", short: "Повороты влево-вправо при максимально ЗАПРОКИНУТОЙ голове.", desc: "Аккуратно запрокиньте голову назад. Из этого положения поворачивайте лицо к левому и правому плечу. Глаза опущены вниз, удерживая фокус." },
        { id: 6, name: "Упражнение №6", short: "Повороты влево-вправо при подбородке, ПРИЖАТОМ к груди.", desc: "Плотно прижмите подбородок к груди и плавно вращайте голову влево и вправо. Глаза подняты вверх, удерживая центральную точку." },
        { id: 7, name: "Упражнение №7", short: "Движение головы по первой диагонали.", desc: "Направляйте голову по диагонали: из нижнего левого угла в верхний правый угол. Взгляд жестко в центре." },
        { id: 8, name: "Упражнение №8", short: "Движение головы по второй диагонали.", desc: "Ведите голову по противоположной диагонали: из нижнего правого угла в верхний левый угол. Глаза приклеены к центру." },
        { id: 9, name: "Упражнение №9", short: "Круговые вращения головы ПО часовой стрелке.", desc: "Выполняйте медленное вращение всей головой по большой окружности по часовой стрелке. Взгляд неподвижно удерживает центр." },
        { id: 10, name: "Упражнение №10", short: "Круговые вращения головы ПРОТИВ часовой стрелки.", desc: "То же круговое вращение всей головой, но против часовой стрелки. Движения размеренные, взгляд впивается в мишень." },
        { id: 11, name: "Упражнение №11 (Массаж)", short: "Пальминг и расслабляющий массаж глаз.", desc: "Закройте глаза. Разогретыми ладонями мягко прикройте веки. Выполните легкие круговые движения пальцами для снятия спазма." }
    ];

    // БАЗА 5 ДИНАМИЧЕСКИХ УПРАЖНЕНИЙ (ШАГ 7)
    const dynamicExercises = [
        { id: 1, name: "Упражнение №1 (Динамика)", short: "Синхронное движение глаз и головы.", desc: "Плавно перемещайте голову из стороны в сторону, при этом взгляд движется попутно, опережая или четко следуя за контрольной точкой." },
        { id: 2, name: "Упражнение №2 (Динамика)", short: "Быстрые горизонтальные переключения взгляда.", desc: "Голова зафиксирована прямо. Глаза совершают ритмичные прыжки (саккады) от левого края к правому и обратно на максимальной скорости." },
        { id: 3, name: "Упражнение №3 (Динамика)", short: "Вертикальные прыжки взгляда.", desc: "Удерживая лицо неподвижным, переключайте фокус глаз строго по вертикали: из крайней верхней точки в крайнюю нижнюю." },
        { id: 4, name: "Упражнение №4 (Динамика)", short: "Диагональное слежение по углам.", desc: "Глаза перемещаются по воображаемому кресту (из левого верхнего угла в правый нижний и наоборот), тренируя периферические зоны." },
        { id: 5, name: "Упражнение №5 (Динамика)", short: "Фокусировка близко-далеко.", desc: "Посмотрите на кончик носа (или палец близко к лицу), затем резко переведите взгляд на удаленный объект за окном на линии горизонта." }
    ];

    let activeExercisesList = [];

    function switchStep(stepNum) {
        const step = stepsData[stepNum];
        if (!step) return;

        // 1. Подсветка активной вкладки шагов
        document.querySelectorAll('.step-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`step-tab-${stepNum}`).classList.add('active');

        // 2. ФИЗИЧЕСКАЯ ПОДМЕНА ВИДЕО В ПЛЕЕРЕ
        document.getElementById('main-video-player').src = step.video;

        // 3. Управление интерактивным блоком упражнений
        const selectorBlock = document.getElementById('exercise-selector-block');
        const dropdown = document.getElementById('dropdown-select');

        if (step.isExerciseStep) {
            selectorBlock.style.display = 'flex';
            activeExercisesList = step.type === 'static' ? staticExercises : dynamicExercises;
            dropdown.innerHTML = activeExercisesList.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            updateExerciseText(1);
        } else {
            selectorBlock.style.display = 'none';
            document.getElementById('text-target-zone').innerHTML = `
                <h3 style="margin-top:0; color: #2c3e50;">${step.name}</h3>
                <div class="ex-full-details">${step.desc}</div>
            `;
        }
    }

    function updateExerciseText(id) {
        const data = activeExercisesList.find(e => e.id === id);
        if (!data) return;

        document.getElementById('text-target-zone').innerHTML = `
            <h3 style="margin-top:0; color: #2c3e50;">${data.name}</h3>
            <div class="ex-short-brief">🎯 Суть: ${data.short}</div>
            <div class="ex-full-details"><strong>Техника выполнения:</strong> ${data.desc}</div>
        `;
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        body.classList.toggle('green-theme');
        btn.innerText = body.classList.contains('green-theme') ? "Переключить на Синюю тему" : "Переключить на Зелёную тему";
    }

    // Автостарт на Шаге 6
    switchStep(6);
</script>
</body>
</html>
